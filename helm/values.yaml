# ── Helm Chart Values ─────────────────────────────────────────────
# IMAGE TAGS ARE UPDATED AUTOMATICALLY BY JENKINS PIPELINE
# Do not edit manually — use the CI/CD pipeline

global:
  namespace: three-tier
  registry: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com

frontend:
  image:
    repository: three-tier-frontend
    tag: "latest"       # ← Jenkins updates this line
    pullPolicy: Always
  replicas: 2
  resources:
    requests: { cpu: "50m", memory: "64Mi" }
    limits:   { cpu: "200m", memory: "256Mi" }

backend:
  image:
    repository: three-tier-backend
    tag: "latest"       # ← Jenkins updates this line
    pullPolicy: Always
  replicas: 2
  port: 3500
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "512Mi" }

mongodb:
  image:
    repository: mongo
    tag: "6.0"
  storage: 10Gi
  storageClass: gp2

ingress:
  enabled: true
  host: your-domain.com
  certArn: arn:aws:acm:us-east-1:ACCOUNT_ID:certificate/YOUR-CERT-ID
