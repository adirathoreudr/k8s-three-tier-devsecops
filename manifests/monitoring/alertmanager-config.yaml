# manifests/monitoring/alertmanager-config.yaml
# Configures Alertmanager to route all critical/high alerts
# to the AIOps collector webhook for AI triage.
# Apply alongside your kube-prometheus-stack values.

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-aiops-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'namespace', 'service']
      group_wait:      30s
      group_interval:  5m
      repeat_interval: 3h
      receiver: 'default-receiver'

      routes:
        # Route critical + high alerts to AIOps for AI triage
        - matchers:
            - severity =~ "critical|high"
          receiver: 'aiops-webhook'
          group_wait:     10s
          group_interval: 1m
          repeat_interval: 30m
          continue: true   # also send to default receiver

        # AIOps self-monitoring — route to default only
        - matchers:
            - app = "aiops-incident-commander"
          receiver: 'default-receiver'

    receivers:
      - name: 'default-receiver'
        # Add your Slack/PagerDuty/email here
        # slack_configs:
        #   - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
        #     channel: '#alerts'

      - name: 'aiops-webhook'
        webhook_configs:
          - url: 'http://aiops-collector.aiops.svc.cluster.local:8000/webhook/alertmanager'
            send_resolved: true
            http_config:
              timeout: 30s

    inhibit_rules:
      # Inhibit warning alerts if critical alert exists for same namespace/service
      - source_matchers:
          - severity = "critical"
        target_matchers:
          - severity = "warning"
        equal: ['namespace', 'service', 'alertname']
