# manifests/aiops-platform.yaml
# Deploys: redis, aiops-collector, aiops-agent, aiops-executor
# Apply: kubectl apply -f manifests/aiops-platform.yaml -n aiops

---
# ── Redis ─────────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: aiops
  labels:
    app: redis
    component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: aiops
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

---
# ── Collector ─────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-collector
  namespace: aiops
  labels:
    app: aiops-collector
    component: telemetry
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aiops-collector
  template:
    metadata:
      labels:
        app: aiops-collector
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: aiops-collector
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: collector
          image: "REPLACE_WITH_ECR_URL/aiops-incident-commander/collector:latest"
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: aiops-config
          env:
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: LOKI_URL
              value: "http://loki.monitoring.svc.cluster.local:3100"
            - name: K8S_API_URL
              value: "http://aiops-executor:8002"
          resources:
            requests: { cpu: "200m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: aiops-collector
  namespace: aiops
  labels:
    app: aiops-collector
spec:
  selector:
    app: aiops-collector
  ports:
    - name: http
      port: 8000
      targetPort: 8000

---
# ── Agent ─────────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-agent
  namespace: aiops
  labels:
    app: aiops-agent
    component: reasoning
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-agent
  template:
    metadata:
      labels:
        app: aiops-agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: aiops-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: agent
          image: "REPLACE_WITH_ECR_URL/aiops-incident-commander/agent:latest"
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: aiops-config
          env:
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: openai-api-key
            - name: COLLECTOR_URL
              value: "http://aiops-collector:8000"
            - name: EXECUTOR_URL
              value: "http://aiops-executor:8002"
          volumeMounts:
            - name: knowledge-base
              mountPath: /app/knowledge-base
              readOnly: true
          resources:
            requests: { cpu: "500m", memory: "512Mi" }
            limits:   { cpu: "1000m", memory: "1Gi" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8001 }
            initialDelaySeconds: 15
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /healthz, port: 8001 }
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: knowledge-base
          configMap:
            name: aiops-knowledge-base

---
apiVersion: v1
kind: Service
metadata:
  name: aiops-agent
  namespace: aiops
spec:
  selector:
    app: aiops-agent
  ports:
    - name: http
      port: 8001
      targetPort: 8001

---
# ── Executor ──────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-executor
  namespace: aiops
  labels:
    app: aiops-executor
    component: remediation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-executor
  template:
    metadata:
      labels:
        app: aiops-executor
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: aiops-executor
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: executor
          image: "REPLACE_WITH_ECR_URL/aiops-incident-commander/executor:latest"
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: aiops-config
          env:
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: ARGOCD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: argocd-token
                  optional: true
            - name: IN_CLUSTER
              value: "true"
          resources:
            requests: { cpu: "200m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8002 }
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /healthz, port: 8002 }
            initialDelaySeconds: 20
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: aiops-executor
  namespace: aiops
spec:
  selector:
    app: aiops-executor
  ports:
    - name: http
      port: 8002
      targetPort: 8002

---
# ── ConfigMap ─────────────────────────────────────────────────────────────────

apiVersion: v1
kind: ConfigMap
metadata:
  name: aiops-config
  namespace: aiops
data:
  LLM_MODEL: "gpt-4o-mini"
  LLM_TEMPERATURE: "0.1"
  AUTO_EXECUTE_THRESHOLD: "0.75"
  DEDUP_WINDOW_SECONDS: "120"
  RECOVERY_TIMEOUT_SECONDS: "120"
  MIN_CONFIDENCE_AUTO: "0.75"
  MIN_CONFIDENCE_HIGH_RISK: "0.90"
  BLOCKED_NAMESPACES: "kube-system,kube-public,cert-manager"
  HIGH_RISK_NAMESPACES: "production,prod"

---
# ── Secret template (populate via external-secrets or sealed-secrets) ────────

apiVersion: v1
kind: Secret
metadata:
  name: aiops-secrets
  namespace: aiops
  annotations:
    description: "Populate via external-secrets-operator or kubectl create secret"
type: Opaque
# DO NOT commit real values. Use:
# kubectl create secret generic aiops-secrets \
#   --from-literal=openai-api-key=$OPENAI_API_KEY \
#   --from-literal=argocd-token=$ARGOCD_TOKEN \
#   -n aiops
stringData:
  openai-api-key: "REPLACE_ME"
  argocd-token: "REPLACE_ME"
