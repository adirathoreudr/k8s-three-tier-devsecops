# .github/workflows/ci.yml
# Triggered on every push and PR.
# Jobs: lint → test → build-images → security-scan
# Deploy jobs live in cd.yml (main branch only)

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linters
        run: pip install ruff mypy types-redis

      - name: Ruff (collector)
        run: ruff check collector/ --select E,W,F,I

      - name: Ruff (agent)
        run: ruff check agent/ --select E,W,F,I

      - name: Ruff (executor)
        run: ruff check executor/ --select E,W,F,I

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: UI lint
        working-directory: ui
        run: |
          npm ci
          npm run lint
          npm run type-check

  # ── Unit tests ──────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test deps
        run: |
          pip install pytest pytest-asyncio pytest-cov httpx
          pip install -r collector/requirements.txt
          pip install -r agent/requirements.txt
          pip install -r executor/requirements.txt

      - name: Run collector tests
        env:
          REDIS_URL: redis://localhost:6379
        run: pytest collector/tests/ -v --cov=collector --cov-report=xml --cov-report=term-missing

      - name: Run agent tests
        env:
          REDIS_URL: redis://localhost:6379
          OPENAI_API_KEY: "test-key-not-real"
        run: pytest agent/tests/ -v --cov=agent --cov-report=xml --cov-report=term-missing

      - name: Run executor tests
        env:
          REDIS_URL: redis://localhost:6379
        run: pytest executor/tests/ -v --cov=executor --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./collector/coverage.xml,./agent/coverage.xml,./executor/coverage.xml
          fail_ci_if_error: false

  # ── Build images ────────────────────────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      id-token: write
      contents: read

    strategy:
      matrix:
        service: [collector, agent, executor]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ecr-login.outputs.registry }}/aiops-incident-commander/${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ── Security scan ───────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      id-token: write
      contents: read
      security-events: write

    strategy:
      matrix:
        service: [collector, agent, executor]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: >
            ${{ steps.ecr-login.outputs.registry }}/aiops-incident-commander/${{ matrix.service }}:latest
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif

  # ── UI build check ──────────────────────────────────────────────────────────
  ui-build:
    name: UI Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build Next.js
        working-directory: ui
        env:
          NEXT_PUBLIC_DEMO_MODE: "true"
        run: |
          npm ci
          npm run build
