version: "3.9"

# Run the full three-tier stack locally:
#   docker compose up
#   Frontend → http://localhost:3000
#   Backend  → http://localhost:3500
#   MongoDB  → localhost:27017

services:

  mongodb:
    image: mongo:6.0
    container_name: three-tier-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: taskdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Application-Code/backend
      target: production
    container_name: three-tier-backend
    restart: unless-stopped
    ports:
      - "3500:3500"
    environment:
      NODE_ENV: development
      PORT: 3500
      MONGO_URI: mongodb://mongodb:27017/taskdb
      FRONTEND_URL: http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      default:
        aliases:
          - backend-service
    healthcheck:
      test: ["CMD", "node", "-e",
             "require('http').get('http://localhost:3500/health', r => process.exit(r.statusCode===200?0:1))"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./Application-Code/frontend
      target: production
    container_name: three-tier-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo_data:
    driver: local
