# kube-prometheus-stack Helm values
# Install: helm install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#   -f monitoring/prometheus-grafana-values.yaml -n monitoring

grafana:
  enabled: true
  adminPassword: "ChangeMe-SecurePassword-123!"   # Change before deploy

  # Persistent storage for dashboards
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: gp2

  # Expose via LoadBalancer
  service:
    type: LoadBalancer

  # Pre-load dashboards from configmaps
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
    datasources:
      enabled: true

  grafana.ini:
    server:
      root_url: "https://grafana.your-domain.com"
    security:
      admin_user: admin
      cookie_secure: true
    analytics:
      reporting_enabled: false

prometheus:
  enabled: true

  prometheusSpec:
    retention: 15d
    retentionSize: 10GB

    # Scrape ALL namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    # Resource limits for Prometheus itself
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "2Gi"

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

alertmanager:
  enabled: true

  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          resources:
            requests:
              storage: 2Gi

  config:
    global:
      resolve_timeout: 5m
      smtp_from: "alerts@yourcompany.com"
      smtp_smarthost: "smtp.yourprovider.com:587"
      smtp_auth_username: "alerts@yourcompany.com"
      smtp_auth_password: "YOUR-SMTP-PASSWORD"

    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: email-team
      routes:
        - match:
            severity: critical
          receiver: email-team
          repeat_interval: 1h
        - match:
            severity: warning
          receiver: email-team
          repeat_interval: 4h

    receivers:
      - name: email-team
        email_configs:
          - to: "devops-team@yourcompany.com"
            send_resolved: true

# Node exporter — collects host metrics
nodeExporter:
  enabled: true

# kube-state-metrics — cluster state metrics
kubeStateMetrics:
  enabled: true
