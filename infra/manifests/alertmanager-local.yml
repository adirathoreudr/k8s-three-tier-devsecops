# infra/manifests/alertmanager-local.yml
global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'namespace']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h
  receiver: aiops-webhook
  routes:
    - matchers:
        - severity =~ "critical|high"
      receiver: aiops-webhook
      group_wait: 5s

receivers:
  - name: aiops-webhook
    webhook_configs:
      - url: http://collector:8000/webhook/alertmanager
        send_resolved: true
