# infra/manifests/prometheus.yml
# Local dev Prometheus config — scrapes all AIOps services

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: local-dev
    env: development

rule_files:
  []  # add alert rules here for local testing

scrape_configs:
  - job_name: aiops-collector
    static_configs:
      - targets: ['collector:8000']
    metrics_path: /metrics

  - job_name: aiops-agent
    static_configs:
      - targets: ['agent:8001']
    metrics_path: /metrics

  - job_name: aiops-executor
    static_configs:
      - targets: ['executor:8002']
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
